name: Release

# Builds cross-platform binaries and attaches them to a GitHub Release.
# Trigger by pushing a version tag, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # upload-rust-binary-action uploads to an existing release, so create it first.
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Ensure the release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create "$tag" --repo "$GITHUB_REPOSITORY" --title "$tag" --generate-notes

  build:
    name: ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          # Cross-compiled from the arm64 runner — the Intel macos-13 runner
          # has poor availability and jobs get stuck waiting for it.
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build and upload binary
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: lazyglab
          target: ${{ matrix.target }}
          # Archive name: lazyglab-<target>.tar.gz (.zip on Windows)
          archive: $bin-$target
          # Cross-compilation (e.g. aarch64 linux) is handled via `cross`.
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}

  # Regenerate the Homebrew formula in ragamo/homebrew-tap from the new release.
  # Requires a TAP_GITHUB_TOKEN secret (a PAT with contents:write on the tap).
  # Skips gracefully if the secret is not configured, so releases stay green.
  bump-tap:
    name: Update Homebrew tap
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check tap token
        id: check
        env:
          TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "TAP_GITHUB_TOKEN not set — skipping tap bump"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout lazyglab (for the generator script)
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v5

      - name: Checkout tap
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v5
        with:
          repository: ragamo/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: tap

      - name: Regenerate and commit formula
        if: steps.check.outputs.skip != 'true'
        run: |
          mkdir -p tap/Formula
          sh scripts/gen-formula.sh "${GITHUB_REF_NAME}" > tap/Formula/lazyglab.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/lazyglab.rb
          git diff --staged --quiet || git commit -m "lazyglab ${GITHUB_REF_NAME#v}"
          git push
